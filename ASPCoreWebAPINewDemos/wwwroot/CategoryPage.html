<!DOCTYPE html>
<html>
<head>
    <title>Category App</title>
</head>
<body>

    <div>
        <h2>All Category</h2>
        <ul id="Categories" />
    </div>
    <div>
        <h2>Search by ID</h2>
        <input type="text" id="categoryId" size="5" />
        <input type="button" value="Search" onclick="find();" />
        <p id="Category" />
    </div>

    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-2.0.3.min.js"></script>
    <script>
        var uri = 'https://localhost:7015/api/Categories';

    $(document).ready(function () {
      // Send an AJAX request
      $.getJSON(uri)
          .done(function (data) {
            console.log(data);
			// On success, 'data' contains a list of Employees.
            $.each(data, function (key, item) {

             // Add a list item for the Employee.
                $('<li>', { text: formatItem(item) }).appendTo($('#Categories'));
            });
          });
    });

    function formatItem(item) {
      return item.name + '  :  ' + item.description;
    }

    function find() {
        var id = $('#categoryId').val();
      $.getJSON(uri + '/' + id)
          .done(function (data) {
              $('#Category').text(formatItem(data));
          })
          .fail(function (jqXHR, textStatus, err) {
              $('#Category').text('Error: ' + err);
          });
    }
    </script>
</body>
</html>
